<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030712">
    <meta name="description" content="Bubble Pop Master - A premium 3D bubble shooter game with glassmorphic design">
    <title>Bubble Pop Master 🫧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Animated Space Background -->
        <canvas id="background-canvas"></canvas>

        <!-- Main Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- ─── IN-GAME HUD ─── -->
        <div id="hud-layer" class="ui-layer hidden">

            <div class="hud-top">
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span id="score-display" class="hud-value">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Level</span>
                    <span id="level-display" class="hud-value">1</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">Shots</span>
                    <span id="shots-display" class="hud-value">30</span>
                </div>
                <button id="btn-pause" aria-label="Pause">⏸</button>
            </div>

            <div class="hud-bottom">
                <div class="shooter-hud">
                    <div class="powerups-container">
                        <button class="powerup-btn" id="btn-bomb" title="Bomb – clears neighbors (10🪙)">💣<span class="cost">10</span></button>
                        <button class="powerup-btn" id="btn-rainbow" title="Rainbow – matches any color (15🪙)">🌈<span class="cost">15</span></button>
                        <button class="powerup-btn" id="btn-fire" title="Fire – burns through rows (20🪙)">🔥<span class="cost">20</span></button>
                    </div>
                    <div class="bubble-preview">
                        <span class="hud-label">Next</span>
                        <div id="next-bubble-display"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ─── MAIN MENU ─── -->
        <div id="screen-main" class="ui-screen">
            <div class="logo-container">
                <h1 class="game-title">Bubble<span class="highlight">Pop</span>Master</h1>
            </div>
            <div class="menu-buttons">
                <button id="btn-play-classic" class="main-btn pulse">🎮 Classic Mode</button>
                <button id="btn-play-levels" class="main-btn secondary">🏆 Levels</button>
            </div>
            <div class="menu-footer">
                <button id="btn-settings" class="icon-btn large" title="Settings">⚙️</button>
            </div>
            <div class="coins-display">🪙 <span id="coins-amount-menu">0</span></div>
        </div>

        <!-- ─── LEVEL SELECT ─── -->
        <div id="screen-levels" class="ui-screen hidden">
            <h2>Select Level</h2>
            <div id="level-grid" class="scrollable-grid"></div>
            <button id="btn-back-levels" class="nav-btn">⬅ Back</button>
        </div>

        <!-- ─── PAUSE MENU ─── -->
        <div id="screen-pause" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2>Paused</h2>
                <div class="modal-buttons">
                    <button id="btn-resume" class="main-btn">▶ Resume</button>
                    <button id="btn-restart-pause" class="main-btn secondary">↺ Restart</button>
                    <button id="btn-quit-pause" class="main-btn danger">✕ Quit</button>
                </div>
            </div>
        </div>

        <!-- ─── GAME OVER / WIN ─── -->
        <div id="screen-gameover" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2 id="end-title">Level Clear!</h2>
                <div class="stars-container">
                    <span class="star" id="star-1">⭐</span>
                    <span class="star" id="star-2">⭐</span>
                    <span class="star" id="star-3">⭐</span>
                </div>
                <div class="stats-box">
                    <p>Score <span id="end-score">0</span></p>
                    <p>Bonus <span id="end-bonus">+0</span></p>
                </div>
                <div class="modal-buttons">
                    <button id="btn-next-level" class="main-btn pulse">Next Level ▶</button>
                    <button id="btn-restart-end" class="main-btn secondary">↺ Retry</button>
                    <button id="btn-quit-end" class="main-btn danger">✕ Menu</button>
                </div>
            </div>
        </div>

        <!-- ─── SETTINGS ─── -->
        <div id="screen-settings" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2>Settings</h2>
                <div class="settings-row">
                    <span>🎵 Music</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-music" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <span>🔊 Sound FX</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-sfx" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <button id="btn-close-settings" class="main-btn">✓ Done</button>
            </div>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
