<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitalClash - Bubble Shooter</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Animated Background -->
        <canvas id="background-canvas"></canvas>

        <!-- The Game Canvas where all the rendering happens -->
        <canvas id="game-canvas"></canvas>

        <!-- HUD Layer (Score, Pause Button, Level) -->
        <div id="hud-layer" class="ui-layer hidden">
            <div class="hud-top">
                <div class="hud-item score-container">
                    <span class="hud-label">SCORE</span>
                    <span id="score-display" class="hud-value">0</span>
                </div>
                <div class="hud-item level-container">
                    <span class="hud-label">LEVEL</span>
                    <span id="level-display" class="hud-value">1</span>
                </div>
                <div class="hud-item lives-container">
                    <span class="hud-label">SHOTS</span>
                    <span id="shots-display" class="hud-value">30</span>
                </div>
                <button id="btn-pause" class="icon-btn">⏸️</button>
            </div>
            <div class="hud-bottom">
                <div class="shooter-hud">
                    <div class="bubble-preview">
                        <span class="hud-label">NEXT</span>
                        <div id="next-bubble-display"></div>
                    </div>
                    <div class="powerups-container">
                        <button class="powerup-btn" id="btn-bomb" title="Bomb Bubble">💣<span class="cost">10</span></button>
                        <button class="powerup-btn" id="btn-rainbow" title="Rainbow Bubble">🌈<span class="cost">15</span></button>
                        <button class="powerup-btn" id="btn-fire" title="Fire Bubble">🔥<span class="cost">20</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="screen-main" class="ui-screen">
            <div class="logo-container">
                <h1 class="game-title">ORBITAL<br><span class="highlight">CLASH</span></h1>
            </div>
            <div class="menu-buttons">
                <button id="btn-play-classic" class="main-btn pulse">CLASSIC MODE</button>
                <button id="btn-play-levels" class="main-btn">LEVELS</button>
                <button id="btn-settings" class="icon-btn large">⚙️</button>
            </div>
            <div class="coins-display">💰 <span id="coins-amount-menu">0</span></div>
        </div>

        <!-- Level Select Menu -->
        <div id="screen-levels" class="ui-screen hidden">
            <h2>Select Level</h2>
            <div id="level-grid" class="scrollable-grid">
                <!-- Level buttons injected by JS -->
            </div>
            <button id="btn-back-levels" class="nav-btn">⬅️ BACK</button>
        </div>

        <!-- Pause Menu -->
        <div id="screen-pause" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2>PAUSED</h2>
                <button id="btn-resume" class="main-btn">RESUME</button>
                <button id="btn-restart-pause" class="main-btn secondary">RESTART</button>
                <button id="btn-quit-pause" class="main-btn danger">QUIT</button>
            </div>
        </div>

        <!-- Game Over / Victory Menu -->
        <div id="screen-gameover" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2 id="end-title">LEVEL CLEARED!</h2>
                <div class="stars-container">
                    <span class="star" id="star-1">⭐</span>
                    <span class="star" id="star-2">⭐</span>
                    <span class="star" id="star-3">⭐</span>
                </div>
                <div class="stats-box">
                    <p>Score: <span id="end-score">0</span></p>
                    <p>Bonus: <span id="end-bonus">0</span></p>
                </div>
                <div class="modal-buttons">
                    <button id="btn-next-level" class="main-btn pulse">NEXT LEVEL</button>
                    <button id="btn-restart-end" class="main-btn secondary">RETRY</button>
                    <button id="btn-quit-end" class="main-btn nav-btn">MENU</button>
                </div>
            </div>
        </div>

        <!-- Settings Menu -->
        <div id="screen-settings" class="ui-screen hidden overlay-bg">
            <div class="modal-box">
                <h2>SETTINGS</h2>
                <div class="settings-row">
                    <span>Music</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-music" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="settings-row">
                    <span>Sound FX</span>
                    <label class="switch">
                        <input type="checkbox" id="toggle-sfx" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <button id="btn-close-settings" class="main-btn">DONE</button>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
